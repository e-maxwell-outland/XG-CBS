map:
  dimensions: [9, 6]
  # Horizontal wall at y=3 with single gap at (4,3).
  # All four agents must cross y=3 → must all visit (4,3) → segment_cost >= 4.
  # (9,3) seals the boundary column (planner allows x=9 via off-by-one).
  obstacles:
    - [0, 3]
    - [1, 3]
    - [2, 3]
    - [3, 3]
    - [5, 3]
    - [6, 3]
    - [7, 3]
    - [8, 3]
    - [9, 3]   # seals boundary column

agents:
  - name: "agent0"
    start: [0, 1]
    goal:  [8, 4]
  - name: "agent1"
    start: [8, 4]
    goal:  [0, 1]
  - name: "agent2"
    start: [2, 5]
    goal:  [6, 0]
  - name: "agent3"
    start: [6, 0]
    goal:  [2, 5]

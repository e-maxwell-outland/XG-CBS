map:
  dimensions: [5, 6]
  # ATC funnel: 3-wide approach narrows to 2-wide taxiway, opens to airstrip row.
  # y=0,1,2: 3-wide (x=1,2,3 open). y=3,4: 2-wide (x=2,3 open). y=5: fully open.
  # All agents share the taxiway → strong shared path, segment_cost >= 2.
  # Full boundary seal: y=6 phantom row + x=5 phantom column.
  obstacles:
    - [0, 0]   # left wall y=0..4
    - [0, 1]
    - [0, 2]
    - [0, 3]
    - [0, 4]
    - [4, 0]   # right wall y=0..4
    - [4, 1]
    - [4, 2]
    - [4, 3]
    - [4, 4]
    - [1, 3]   # taxiway narrowing (y=3,4: only x=2,3 open)
    - [1, 4]
    - [0, 6]   # y=6 phantom row
    - [1, 6]
    - [2, 6]
    - [3, 6]
    - [4, 6]
    - [5, 6]
    - [5, 0]   # x=5 phantom column
    - [5, 1]
    - [5, 2]
    - [5, 3]
    - [5, 4]
    - [5, 5]

agents:
  - name: "agent0"
    start: [1, 0]
    goal:  [4, 5]
  - name: "agent1"
    start: [2, 0]
    goal:  [0, 5]
  - name: "agent2"
    start: [3, 0]
    goal:  [3, 5]

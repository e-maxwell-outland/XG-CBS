map:
  dimensions: [9, 5]
  # Vertical wall at x=4 with a single gap at (4,2).
  # All 4 agents start on the left (x=0) and goal on the right (x=8).
  # Every agent must cross x=4 through (4,2) → all paths share (4,2) → segment_cost >= 4.
  # No swaps: no agent's start equals another's goal.
  # [4,5] seals the off-by-one boundary row (planner allows y=5 via bounds check).
  obstacles:
    - [4, 0]
    - [4, 1]
    - [4, 3]
    - [4, 4]
    - [4, 5]   # boundary seal

agents:
  - name: "agent0"
    start: [0, 0]
    goal:  [8, 4]
  - name: "agent1"
    start: [0, 1]
    goal:  [8, 3]
  - name: "agent2"
    start: [0, 3]
    goal:  [8, 1]
  - name: "agent3"
    start: [0, 4]
    goal:  [8, 0]

map:
  dimensions: [9, 9]
  # Single vertical wall at x=4 with gap at (4,4).
  # NOTE: the cross-wall design was broken — all 4 neighbors of the gap cell
  # became obstacles, making the grid unsolvable. Single wall avoids this.
  # All 4 agents cross from one side to the other → all visit (4,4) → segment_cost >= 4.
  # (4,9) seals the boundary row (planner allows y=9 via off-by-one).
  obstacles:
    - [4, 0]
    - [4, 1]
    - [4, 2]
    - [4, 3]
    - [4, 5]
    - [4, 6]
    - [4, 7]
    - [4, 8]
    - [4, 9]   # seals boundary row

agents:
  - name: "agent0"
    start: [0, 0]
    goal:  [8, 8]
  - name: "agent1"
    start: [8, 8]
    goal:  [0, 0]
  - name: "agent2"
    start: [0, 8]
    goal:  [8, 0]
  - name: "agent3"
    start: [8, 0]
    goal:  [0, 8]

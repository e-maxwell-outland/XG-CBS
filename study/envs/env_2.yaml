map:
  dimensions: [11, 3]
  # Wide, short grid. Vertical wall at x=5 with gap at (5,1).
  # 3 agents, fan pattern: agent0 crosses from bottom-left to top-right,
  # agent2 from top-left to bottom-right — paths visually cross after the wall.
  # All must visit (5,1) → segment_cost >= 3.
  # Full boundary seal: entire y=3 phantom row + x=11 phantom column.
  obstacles:
    - [5, 0]   # wall (gap at y=1)
    - [5, 2]
    - [0, 3]   # y=3 phantom row
    - [1, 3]
    - [2, 3]
    - [3, 3]
    - [4, 3]
    - [5, 3]
    - [6, 3]
    - [7, 3]
    - [8, 3]
    - [9, 3]
    - [10, 3]
    - [11, 3]
    - [11, 0]  # x=11 phantom column
    - [11, 1]
    - [11, 2]

agents:
  - name: "agent0"
    start: [0, 0]
    goal:  [10, 2]
  - name: "agent1"
    start: [0, 1]
    goal:  [10, 1]
  - name: "agent2"
    start: [0, 2]
    goal:  [10, 0]

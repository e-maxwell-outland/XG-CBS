map:
  dimensions: [6, 3]
  # S-curve double wall (compressed to 3 rows).
  # Wall 1 at x=2: gap at top (y=2). Wall 2 at x=4: gap at bottom (y=0).
  # All agents zig-zag: climb to (2,2), descend to (4,0) → S-curve paths.
  # Full boundary seal: y=3 phantom row + x=6 phantom column.
  obstacles:
    - [2, 0]   # wall 1 (gap at y=2)
    - [2, 1]
    - [4, 1]   # wall 2 (gap at y=0)
    - [4, 2]
    - [0, 3]   # y=3 phantom row
    - [1, 3]
    - [2, 3]
    - [3, 3]
    - [4, 3]
    - [5, 3]
    - [6, 3]
    - [6, 0]   # x=6 phantom column
    - [6, 1]
    - [6, 2]

agents:
  - name: "agent0"
    start: [0, 0]
    goal:  [5, 2]
  - name: "agent1"
    start: [0, 1]
    goal:  [5, 1]
  - name: "agent2"
    start: [0, 2]
    goal:  [5, 0]

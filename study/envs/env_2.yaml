map:
  dimensions: [7, 4]
  # Vertical wall at x=3 with a single gap at (3,2).
  # All 4 agents start on the left (x=0) and goal on the right (x=6).
  # Every agent must cross x=3 through (3,2) → all paths share (3,2) → segment_cost >= 4.
  # No swaps: no agent's start equals another's goal.
  # [3,4] seals the off-by-one boundary row (planner allows y=4 via bounds check).
  obstacles:
    - [3, 0]
    - [3, 1]
    - [3, 3]
    - [3, 4]   # boundary seal

agents:
  - name: "agent0"
    start: [0, 0]
    goal:  [6, 3]
  - name: "agent1"
    start: [0, 1]
    goal:  [6, 2]
  - name: "agent2"
    start: [0, 2]
    goal:  [6, 1]
  - name: "agent3"
    start: [0, 3]
    goal:  [6, 0]

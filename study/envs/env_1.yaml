map:
  dimensions: [7, 7]
  # Vertical wall at x=3 with single gap at (3,3).
  # All agents must cross x=3 → must all visit (3,3) → segment_cost >= 3.
  # (3,7) blocks the off-by-one boundary cell the planner can otherwise reach.
  obstacles:
    - [3, 0]
    - [3, 1]
    - [3, 2]
    - [3, 4]
    - [3, 5]
    - [3, 6]
    - [3, 7]   # seals boundary row (planner allows y=7 via off-by-one in bounds check)

agents:
  - name: "agent0"
    start: [0, 3]
    goal:  [6, 3]
  - name: "agent1"
    start: [0, 0]
    goal:  [6, 6]
  - name: "agent2"
    start: [0, 6]
    goal:  [6, 0]

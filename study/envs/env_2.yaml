map:
  dimensions: [9, 6]
  # Horizontal wall at y=3 with single gap at (4,3).
  # 3 agents travel top→bottom; start_x == goal_x so no horizontal crossing needed.
  # Agent1 at x=4 goes straight through the gap; agents 0,2 make small detours.
  # All 3 must visit (4,3) → segment_cost >= 3.
  # Full boundary seal: entire y=6 phantom row + x=9 phantom column.
  obstacles:
    - [0, 3]   # wall
    - [1, 3]
    - [2, 3]
    - [3, 3]
    - [5, 3]   # wall continues (gap at x=4)
    - [6, 3]
    - [7, 3]
    - [8, 3]
    - [0, 6]   # y=6 phantom row
    - [1, 6]
    - [2, 6]
    - [3, 6]
    - [4, 6]
    - [5, 6]
    - [6, 6]
    - [7, 6]
    - [8, 6]
    - [9, 6]
    - [9, 0]   # x=9 phantom column
    - [9, 1]
    - [9, 2]
    - [9, 3]
    - [9, 4]
    - [9, 5]

agents:
  - name: "agent0"
    start: [2, 5]
    goal:  [2, 0]
  - name: "agent1"
    start: [4, 5]
    goal:  [4, 0]
  - name: "agent2"
    start: [6, 5]
    goal:  [6, 0]

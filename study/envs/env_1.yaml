map:
  dimensions: [7, 7]
  # Open grid — agents0/1 go perpendicular, guaranteed to share (3,3).
  # Agent2 crosses diagonally and likely shares cells with both.

agents:
  - name: "agent0"
    start: [0, 3]
    goal:  [6, 3]
  - name: "agent1"
    start: [3, 6]
    goal:  [3, 0]
  - name: "agent2"
    start: [0, 0]
    goal:  [6, 6]

map:
  dimensions: [5, 5]
  # Vertical barrier at x=2, single center gap at y=2.
  # All three agents must pass through (2,2) → guaranteed segment_cost >= 2.
  # Full boundary seal: y=5 phantom row + x=5 phantom column.
  obstacles:
    - [2, 0]   # barrier (gap at y=2)
    - [2, 1]
    - [2, 3]
    - [2, 4]
    - [0, 5]   # y=5 phantom row
    - [1, 5]
    - [2, 5]
    - [3, 5]
    - [4, 5]
    - [5, 5]
    - [5, 0]   # x=5 phantom column
    - [5, 1]
    - [5, 2]
    - [5, 3]
    - [5, 4]

agents:
  - name: "agent0"
    start: [0, 0]
    goal:  [4, 4]
  - name: "agent1"
    start: [0, 2]
    goal:  [4, 2]
  - name: "agent2"
    start: [0, 4]
    goal:  [4, 0]

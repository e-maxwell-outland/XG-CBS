map:
  dimensions: [9, 5]
  # Open grid — agents 0&1 travel the same horizontal row in opposite directions
  # (guaranteed full overlap). Agents 2&3 cross perpendicularly.

agents:
  - name: "agent0"
    start: [0, 2]
    goal:  [8, 2]
  - name: "agent1"
    start: [8, 2]
    goal:  [0, 2]
  - name: "agent2"
    start: [4, 4]
    goal:  [4, 0]
  - name: "agent3"
    start: [2, 4]
    goal:  [6, 0]

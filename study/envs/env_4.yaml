map:
  dimensions: [7, 5]
  # Vertical wall at x=3 with single gap at (3,1).
  # 3 agents L→R, fan pattern: agent0 starts below gap and ends above,
  # agent2 starts above gap and ends below — paths cross after the wall.
  # All must visit (3,1) → segment_cost >= 3.
  # Full boundary seal: entire y=5 phantom row + x=7 phantom column.
  obstacles:
    - [3, 0]   # wall
    - [3, 2]
    - [3, 3]   # wall (gap at y=1)
    - [3, 4]
    - [0, 5]   # y=5 phantom row
    - [1, 5]
    - [2, 5]
    - [3, 5]
    - [4, 5]
    - [5, 5]
    - [6, 5]
    - [7, 5]
    - [7, 0]   # x=7 phantom column
    - [7, 1]
    - [7, 2]
    - [7, 3]
    - [7, 4]

agents:
  - name: "agent0"
    start: [0, 0]
    goal:  [6, 3]
  - name: "agent1"
    start: [0, 1]
    goal:  [6, 2]
  - name: "agent2"
    start: [0, 3]
    goal:  [6, 0]

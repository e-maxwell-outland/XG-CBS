map:
  dimensions: [5, 3]
  # Vertical wall at x=2 with a single gap at (2,1).
  # All 3 agents start on the left (x=0) and goal on the right (x=4).
  # Every agent must cross x=2 through (2,1) → all paths share (2,1) → segment_cost >= 3.
  # No swaps: no agent's start equals another's goal.
  # [2,3] seals the off-by-one boundary row (planner allows y=3 via bounds check).
  obstacles:
    - [2, 0]
    - [2, 2]
    - [2, 3]   # boundary seal

agents:
  - name: "agent0"
    start: [0, 0]
    goal:  [4, 2]
  - name: "agent1"
    start: [0, 1]
    goal:  [4, 1]
  - name: "agent2"
    start: [0, 2]
    goal:  [4, 0]

map:
  dimensions: [8, 4]
  # S-curve double wall (tightened from 9×4).
  # Wall 1 at x=2: gap at top (y=3). Wall 2 at x=5: gap at bottom (y=0).
  # All agents zig-zag: climb to (2,3), descend to (5,0) → S-curve paths.
  # Goals sit immediately right of wall 2, forcing tight convergence.
  # Full boundary seal: y=4 phantom row + x=8 phantom column.
  obstacles:
    - [2, 0]   # wall 1 (gap at y=3)
    - [2, 1]
    - [2, 2]
    - [5, 1]   # wall 2 (gap at y=0)
    - [5, 2]
    - [5, 3]
    - [0, 4]   # y=4 phantom row
    - [1, 4]
    - [2, 4]
    - [3, 4]
    - [4, 4]
    - [5, 4]
    - [6, 4]
    - [7, 4]
    - [8, 4]
    - [8, 0]   # x=8 phantom column
    - [8, 1]
    - [8, 2]
    - [8, 3]

agents:
  - name: "agent0"
    start: [0, 0]
    goal:  [6, 2]
  - name: "agent1"
    start: [0, 1]
    goal:  [6, 1]
  - name: "agent2"
    start: [0, 2]
    goal:  [6, 0]

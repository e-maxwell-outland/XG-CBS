map:
  dimensions: [7, 5]
  # Horizontal wall at y=2 with a single gap at (3,2).
  # All 3 agents start at the top (y=4) and goal at the bottom (y=0).
  # Every agent must cross y=2 through (3,2) → all paths share (3,2) → segment_cost >= 3.
  # No swaps: no agent's start equals another's goal.
  # [7,2] seals the off-by-one boundary column (planner allows x=7 via bounds check).
  obstacles:
    - [0, 2]
    - [1, 2]
    - [2, 2]
    - [4, 2]
    - [5, 2]
    - [6, 2]
    - [7, 2]   # boundary seal

agents:
  - name: "agent0"
    start: [0, 4]
    goal:  [6, 0]
  - name: "agent1"
    start: [3, 4]
    goal:  [3, 0]
  - name: "agent2"
    start: [6, 4]
    goal:  [0, 0]

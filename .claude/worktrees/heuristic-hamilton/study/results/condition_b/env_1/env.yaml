map:
  dimensions: [5, 3]
  # Vertical wall at x=2 with single gap at (2,1).
  # 3 agents L→R; all must cross x=2 through (2,1) → segment_cost >= 3.
  # Full boundary seal: entire y=3 phantom row + x=5 phantom column.
  obstacles:
    - [2, 0]   # wall
    - [2, 2]   # wall (gap at y=1)
    - [0, 3]   # y=3 phantom row
    - [1, 3]
    - [2, 3]
    - [3, 3]
    - [4, 3]
    - [5, 3]
    - [5, 0]   # x=5 phantom column
    - [5, 1]
    - [5, 2]

agents:
  - name: "agent0"
    start: [0, 0]
    goal:  [4, 2]
  - name: "agent1"
    start: [0, 1]
    goal:  [4, 1]
  - name: "agent2"
    start: [0, 2]
    goal:  [4, 0]

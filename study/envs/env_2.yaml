map:
  dimensions: [9, 6]
  # Horizontal wall at y=3 with single gap at (4,3).
  # 4 agents travel top→bottom; each agent's start_x == goal_x so no horizontal
  # crossing is needed — agents just queue through the bottleneck (4,3).
  # All 4 must visit (4,3) → segment_cost >= 4.
  # Full boundary seal: entire y=6 phantom row + x=9 phantom column.
  obstacles:
    - [0, 3]   # wall
    - [1, 3]
    - [2, 3]
    - [3, 3]
    - [5, 3]   # wall continues (gap at x=4)
    - [6, 3]
    - [7, 3]
    - [8, 3]
    - [0, 6]   # y=6 phantom row
    - [1, 6]
    - [2, 6]
    - [3, 6]
    - [4, 6]
    - [5, 6]
    - [6, 6]
    - [7, 6]
    - [8, 6]
    - [9, 6]
    - [9, 0]   # x=9 phantom column
    - [9, 1]
    - [9, 2]
    - [9, 3]
    - [9, 4]
    - [9, 5]

agents:
  - name: "agent0"
    start: [1, 5]
    goal:  [1, 0]
  - name: "agent1"
    start: [3, 5]
    goal:  [3, 0]
  - name: "agent2"
    start: [5, 5]
    goal:  [5, 0]
  - name: "agent3"
    start: [7, 5]
    goal:  [7, 0]

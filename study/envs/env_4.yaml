map:
  dimensions: [8, 6]
  # Horizontal wall at y=3 with a single-cell gap at x=4.
  # Every agent must cross y=3, so all paths funnel through (4,3).
  # Three agents all visit (4,3) → guaranteed segment_cost >= 3.
  obstacles:
    - [0, 3]
    - [1, 3]
    - [2, 3]
    - [3, 3]
    - [5, 3]
    - [6, 3]
    - [7, 3]
    - [8, 3]   # seals boundary column (planner allows x=8 via off-by-one)

agents:
  - name: "agent0"
    start: [0, 1]
    goal:  [7, 4]
  - name: "agent1"
    start: [7, 4]
    goal:  [0, 1]
  - name: "agent2"
    start: [3, 5]
    goal:  [5, 0]
